name: PR Guard - Naming Conventions

on:
  pull_request:
    types: [opened, edited, synchronize]

# Explicitly grant the GITHUB_TOKEN permission to post comments
permissions:
  contents: read
  pull-requests: write

jobs:
  enforce-naming:
    name: Check Title and Commits
    runs-on: ubuntu-latest
    steps:
      - name: Validate format via GitHub Script
        id: validate # Added an ID so downstream steps can access its outputs
        uses: actions/github-script@v7
        with:
          script: |
            const pattern = /^(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([a-zA-Z0-9_-]+\))?:\s*\[?[A-Z]{2,}-\d+\]?\s+.*$/;
            
            let errorMessages = [];

            // 1. Validate the Pull Request Title
            const prTitle = context.payload.pull_request.title;
            if (!pattern.test(prTitle)) {
              errorMessages.push(`- ❌ **PR Title:** \`${prTitle}\``);
            }

            // 2. Fetch all commits in this Pull Request
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            // 3. Validate each commit message
            for (const commitObj of commits) {
              const messageSubject = commitObj.commit.message.split('\n')[0];
              if (!pattern.test(messageSubject)) {
                errorMessages.push(`- ❌ **Commit:** \`${messageSubject}\``);
              }
            }

            // 4. If errors exist, format the comment body and set outputs
            if (errorMessages.length > 0) {
              const commentBody = `### 🚨 Naming Convention Check Failed\n\nPlease ensure your PR title and all commit messages follow the format: \`type(scope): JIRA-123 message\`\n\n**The following items need to be fixed:**\n${errorMessages.join('\n')}`;
              
              // Export the data to be used by the next steps
              core.setOutput('has_errors', 'true');
              core.setOutput('comment_body', commentBody);
            } else {
              core.setOutput('has_errors', 'false');
            }

      - name: Post PR Comment
        # Only run this step if the previous step found errors
        if: steps.validate.outputs.has_errors == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.validate.outputs.comment_body }}

      - name: Fail the workflow
        # Finally, fail the action so the PR cannot be merged
        if: steps.validate.outputs.has_errors == 'true'
        run: |
          echo "Naming conventions failed. A comment has been posted on the PR with details."
          exit 1
